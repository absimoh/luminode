<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Luminode</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="login-wrapper">

  <div class="login-card">

    <img src="/assets/images/logo.png" class="logo">

    <h2>Welcome Back 🚀</h2>
    <p class="subtitle">Login to continue the competition</p>

    <input id="email" class="input-box" placeholder="Email">
    <input id="password" type="password" class="input-box" placeholder="Password">

    <button class="primary-btn" onclick="login()">Login</button>

    <p id="msg" style="color:#f87171; margin-top:10px;"></p>

    <p style="margin-top:15px;">
      Don't have an account?
      <a href="/register" style="color:#818cf8;">Register</a>
    </p>

  </div>

</div>

<script>
async function login() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  msg.innerText = "";

  if(!email || !password){
    msg.innerText = "Please enter all fields";
    return;
  }

  try {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.token) {
      localStorage.setItem("token", data.token);
      window.location.href = "/dashboard";
    } else {
      msg.innerText = data.message;
    }

  } catch {
    msg.innerText = "Server error";
  }
}
</script>

</body>
</html>
