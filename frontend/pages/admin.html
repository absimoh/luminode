<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- 🔐 حماية الصفحة -->
<script>
const token = localStorage.getItem("adminToken");

if(!token){
  window.location.href = "/pages/index.html";
}
</script>

<div class="navbar">
  <div class="nav-left">
    <img src="/assets/images/logo.png">
    <img src="/assets/images/org.png">
  </div>

  <div class="nav-links">
    <a href="/pages/dashboard.html">Dashboard</a>
    <a href="/pages/leaderboard.html">Leaderboard</a>
  </div>
</div>

<div class="container">

  <h1>⚙ Admin Dashboard</h1>

  <h3>👥 Online Users: <span id="onlineCount">0</span></h3>

  <!-- ===== CREATE TEAM ===== -->
  <div class="admin-card">
    <h2>Create Team</h2>

    <input id="teamName" placeholder="Team Name">
    <input id="teamPassword" placeholder="Password">

    <button class="primary-btn" onclick="createTeam()">Create Team</button>
  </div>

  <!-- ===== CONTROL ===== -->
  <div class="admin-card">
    <h2>Control Competition</h2>

    <button class="primary-btn" onclick="toggleChallenges(true)">Open Challenges</button>
    <button class="danger-btn" onclick="toggleChallenges(false)">Close Challenges</button>

    <button class="primary-btn" onclick="toggleLeaderboard(true)">Open Leaderboard</button>
    <button class="danger-btn" onclick="toggleLeaderboard(false)">Close Leaderboard</button>
  </div>

  <!-- ===== TICKETS ===== -->
  <div class="admin-card">
    <h2>Help Requests</h2>
    <div id="ticketsContainer"></div>
  </div>

</div>

<div class="footer">
  © 2026 Abbas Al-Mokhtafi
</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

/* ===== ONLINE USERS ===== */
socket.on("onlineCount", (count) => {
  document.getElementById("onlineCount").innerText = count;
});

/* ===== CREATE TEAM ===== */
async function createTeam(){

  const name = document.getElementById("teamName").value.trim();
  const password = document.getElementById("teamPassword").value.trim();

  if(!name || !password){
    alert("Enter team name and password");
    return;
  }

  const res = await fetch("/api/admin/create-team",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization: token
    },
    body: JSON.stringify({ name, password })
  });

  const data = await res.json();
  alert(data.message);

  document.getElementById("teamName").value = "";
  document.getElementById("teamPassword").value = "";
}

/* ===== CONTROL ===== */
async function toggleChallenges(status){

  await fetch("/api/control",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization: token
    },
    body: JSON.stringify({ challengesOpen: status })
  });

  alert("Challenges updated");
}

async function toggleLeaderboard(status){

  await fetch("/api/control",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization: token
    },
    body: JSON.stringify({ leaderboardOpen: status })
  });

  alert("Leaderboard updated");
}

/* ===== LOAD TICKETS ===== */
async function loadTickets(){

  const res = await fetch("/api/tickets",{
    headers:{ Authorization: token }
  });

  const tickets = await res.json();

  const container = document.getElementById("ticketsContainer");
  container.innerHTML = "";

  tickets.forEach(t => {

    const div = document.createElement("div");
    div.className = "ticket-card";

    div.innerHTML = `
      <strong>${t.teamName}</strong>
      <p>${t.message}</p>
      <button class="danger-btn" onclick="closeTicket('${t._id}')">Close</button>
    `;

    container.appendChild(div);

  });
}

/* ===== CLOSE TICKET ===== */
async function closeTicket(id){

  await fetch(`/api/tickets/${id}`,{
    method:"PUT",
    headers:{ Authorization: token }
  });

  loadTickets();
}

/* ===== REALTIME ===== */
socket.on("newTicket", () => {
  loadTickets();
});

/* ===== INIT ===== */
loadTickets();

</script>

</body>
</html>
