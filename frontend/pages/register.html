<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - Luminode</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="login-wrapper">

  <div class="login-card">

    <img src="/assets/images/logo.png" class="logo">

    <h2>Create Account 🚀</h2>
    <p class="subtitle">Join the competition now</p>

    <input id="username" class="input-box" placeholder="Username">
    <input id="email" class="input-box" placeholder="Email">
    <input id="password" type="password" class="input-box" placeholder="Password">

    <button class="primary-btn" onclick="register()">Register</button>

    <p id="msg" style="color:#f87171; margin-top:10px;"></p>

    <p style="margin-top:15px;">
      Already have an account?
      <a href="/login" style="color:#818cf8;">Login</a>
    </p>

  </div>

</div>

<script>
async function register() {

  const username = document.getElementById("username").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  msg.innerText = "";

  if(!username || !email || !password){
    msg.innerText = "Please fill all fields";
    return;
  }

  try {
    const res = await fetch("/api/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, email, password })
    });

    const data = await res.json();

    if(data.message === "User created successfully" || data.message === "User created"){
      msg.style.color = "#4ade80";
      msg.innerText = "Account created! Redirecting...";
      
      setTimeout(() => {
        window.location.href = "/login";
      }, 1200);
    } else {
      msg.style.color = "#f87171";
      msg.innerText = data.message;
    }

  } catch {
    msg.innerText = "Server error";
  }
}
</script>

</body>
</html>
