<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Luminode Competition</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
  <div class="nav-left">
    <img src="/assets/images/logo.png">
    <img src="/assets/images/org.png">
  </div>
</div>

<div class="container">

  <h1>Welcome to Luminode 🚀</h1>
  <p class="subtitle">Join the competition and test your skills</p>

  <div id="mainActions" style="text-align:center; margin-top:40px;"></div>

</div>

<div class="footer">
  © 2026 Abbas Al-Mokhtafi. All Rights Reserved.
</div>
<script>

async function init(){

  const container = document.getElementById("mainActions");
  container.innerHTML = "";

  const token = localStorage.getItem("token");

  // 🔐 تحقق من التوكن فعليًا
  if(token){

    try {
      const res = await fetch("/api/me", {
        headers: {
          Authorization: token
        }
      });

      if(res.ok){

        const btn = document.createElement("button");
        btn.className = "primary-btn";
        btn.innerText = "Enter Dashboard";

        btn.onclick = () => {
          window.location.href = "/dashboard";
        };

        const logoutBtn = document.createElement("button");
        logoutBtn.className = "danger-btn";
        logoutBtn.innerText = "Logout";
        logoutBtn.style.marginLeft = "10px";

        logoutBtn.onclick = () => {
          localStorage.removeItem("token");
          location.reload();
        };

        container.appendChild(btn);
        container.appendChild(logoutBtn);

        return;
      }

    } catch {
      localStorage.removeItem("token");
    }
  }

  // ❌ إذا ما عنده حساب أو التوكن غلط
  const loginBtn = document.createElement("button");
  loginBtn.className = "primary-btn";
  loginBtn.innerText = "Login";

  loginBtn.onclick = () => {
    window.location.href = "/login";
  };

  const registerBtn = document.createElement("button");
  registerBtn.className = "primary-btn";
  registerBtn.innerText = "Register";
  registerBtn.style.marginLeft = "10px";

  registerBtn.onclick = () => {
    window.location.href = "/register";
  };

  container.appendChild(loginBtn);
  container.appendChild(registerBtn);
}

init();

</script>

</body>
</html>
