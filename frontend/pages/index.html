<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Luminode Competition</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="navbar">
  <div class="nav-left">
    <img src="/assets/images/logo.png">
    <img src="/assets/images/org.png">
  </div>
</div>

<div class="container">

  <h1>Welcome to Luminode</h1>
  <p class="subtitle">Start your journey</p>

  <div class="home-buttons">

    <button class="main-btn blue" onclick="showTeams()">
      🚀 Enter Team
    </button>

    <button class="main-btn red" onclick="goToCreate()">
      ➕ Create Team
    </button>

  </div>

  <div id="teamsSection" style="margin-top:30px;"></div>

</div>

<div class="footer">
  © 2026 Abbas Al-Mokhtafi. All Rights Reserved.
</div>

<!-- ===== LOGIN MODAL ===== -->
<div id="loginModal" class="modal">
  <div class="modal-content">
    <h2 id="selectedTeamTitle"></h2>

    <input type="text" id="memberName" placeholder="Your Name">
    <input type="password" id="teamPassword" placeholder="Team Password">

    <button class="primary-btn" onclick="login()">Enter</button>
    <button class="danger-btn" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>

let selectedTeam = null;

/* ===== SHOW TEAMS ===== */
async function showTeams() {

  const section = document.getElementById("teamsSection");

  section.innerHTML = `
    <h2 style="margin-bottom:15px;">Select Your Team</h2>
    <div id="teamsGrid" class="teams-grid"></div>
  `;

  try {

    const res = await fetch("/api/teams");
    const teams = await res.json();

    const grid = document.getElementById("teamsGrid");
    grid.innerHTML = "";

    if(teams.length === 0){
      grid.innerHTML = "<p>No teams available</p>";
      return;
    }

    teams.forEach(team => {
      const card = document.createElement("div");
      card.className = "team-card";
      card.innerHTML = `<h3>${team.name}</h3>`;
      card.onclick = () => openModal(team.name);
      grid.appendChild(card);
    });

  } catch(err){
    console.log(err);
    alert("Error loading teams");
  }
}

/* ===== MODAL ===== */
function openModal(teamName) {
  selectedTeam = teamName;
  document.getElementById("selectedTeamTitle").innerText = teamName;
  document.getElementById("loginModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("loginModal").style.display = "none";
}

/* ===== LOGIN ===== */
async function login() {

  const memberName = document.getElementById("memberName").value.trim();
  const password = document.getElementById("teamPassword").value.trim();

  if(!memberName || !password){
    return alert("Please enter your name and password");
  }

  try {

    const res = await fetch("/api/team/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: selectedTeam,
        password
      })
    });

    const data = await res.json();

    if (!data.token) {
      return alert(data.message || "Login failed");
    }

    // حفظ البيانات
    localStorage.setItem("token", data.token);
    localStorage.setItem("teamName", selectedTeam);
    localStorage.setItem("memberName", memberName);

    // تسجيل العضو
    await fetch("/api/team/join", {
      method: "POST",
      headers: {
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        name: selectedTeam,
        memberName
      })
    });

    window.location.href = "/dashboard.html";

  } catch(err){
    console.log(err);
    alert("Server error");
  }
}

/* ===== CREATE ===== */
function goToCreate(){
  window.location.href = "/admin.html";
}

/* ===== AUTO FILL NAME ===== */
window.onload = () => {
  const savedName = localStorage.getItem("memberName");
  if(savedName){
    document.getElementById("memberName").value = savedName;
  }
};

</script>

</body>
</html>
