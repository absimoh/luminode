<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Luminode Competition</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
  <div class="nav-left">
    <img src="/assets/images/logo.png">
    <img src="/assets/images/org.png">
  </div>
</div>

<div class="container">

  <h1>Welcome to Luminode</h1>
  <p class="subtitle">Start your journey</p>

  <div class="home-buttons">

    <button class="main-btn blue" onclick="showTeams()">
      🚀 Enter Team
    </button>

    <button class="main-btn red" onclick="openCreateModal()">
      ➕ Create Team
    </button>

  </div>

  <div id="teamsSection" style="margin-top:30px;"></div>

</div>

<div class="footer">
  © 2026 Abbas Al-Mokhtafi
</div>

<!-- ===== LOGIN MODAL ===== -->
<div id="loginModal" class="modal">
  <div class="modal-content">
    <h2 id="teamTitle"></h2>

    <input id="memberName" placeholder="Your Name">
    <input id="teamPassword" type="password" placeholder="Team Password">

    <button class="primary-btn" onclick="login()">Enter</button>
    <button class="danger-btn" onclick="closeLoginModal()">Cancel</button>
  </div>
</div>

<!-- ===== CREATE TEAM MODAL ===== -->
<div id="createModal" class="modal">
  <div class="modal-content">
    <h2>Create Team</h2>

    <input id="newTeamName" placeholder="Team Name">
    <input id="newTeamPassword" placeholder="Password">

    <button class="primary-btn" onclick="createTeam()">Create</button>
    <button class="danger-btn" onclick="closeCreateModal()">Cancel</button>
  </div>
</div>

<script>

let selectedTeam = null;

/* ===== SHOW TEAMS ===== */
async function showTeams(){

  const section = document.getElementById("teamsSection");

  const res = await fetch("/api/teams");
  const teams = await res.json();

  if(teams.length === 0){
    section.innerHTML = "<p>No teams available</p>";
    return;
  }

  section.innerHTML = `
    <h2>Select Your Team</h2>
    <div id="teamsGrid" class="teams-grid"></div>
  `;

  const grid = document.getElementById("teamsGrid");

  teams.forEach(team=>{
    const card = document.createElement("div");
    card.className = "team-card";
    card.innerText = team.name;

    // 🔥 أهم سطر
    card.onclick = () => openLoginModal(team.name);

    grid.appendChild(card);
  });
}

/* ===== LOGIN ===== */
function openLoginModal(teamName){
  selectedTeam = teamName;
  document.getElementById("teamTitle").innerText = teamName;
  document.getElementById("loginModal").style.display = "flex";
}

function closeLoginModal(){
  document.getElementById("loginModal").style.display = "none";
}

async function login(){

  const memberName = document.getElementById("memberName").value;
  const password = document.getElementById("teamPassword").value;

  if(!memberName || !password){
    return alert("Enter all fields");
  }

  const res = await fetch("/api/team/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      name: selectedTeam,
      password
    })
  });

  const data = await res.json();

  if(!data.success){
    return alert(data.message || "Login failed");
  }

  localStorage.setItem("teamName", selectedTeam);
  localStorage.setItem("memberName", memberName);

  window.location.href = "/dashboard";
}



/* ===== CREATE TEAM ===== */
function openCreateModal(){
  document.getElementById("createModal").style.display = "flex";
}

function closeCreateModal(){
  document.getElementById("createModal").style.display = "none";
}

async function createTeam(){

  const name = document.getElementById("newTeamName").value;
  const password = document.getElementById("newTeamPassword").value;

  if(!name || !password){
    return alert("Enter all fields");
  }

  const res = await fetch("/api/team/create",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ name, password })
  });

  const data = await res.json();

  alert(data.message);

  closeCreateModal();
  showTeams();
}
const mongoose = require("mongoose");
const cors = require("cors");
const http = require("http");
const path = require("path");
const { Server } = require("socket.io");

const Team = require("./models/Team");
const Question = require("./models/Question");
const Ticket = require("./models/Ticket");

const app = express();
const server = http.createServer(app);

const io = new Server(server, {
  cors: { origin: "*" }
});

app.use(cors());
app.use(express.json());

app.use(express.static(path.join(__dirname, "../frontend")));

/* ===== DB ===== */
mongoose.connect(process.env.MONGO_URI)
.then(()=> console.log("✅ MongoDB Connected"))
.catch(err=> console.log(err));

/* ===== SOCKET ===== */
io.on("connection",(socket)=>{
  socket.on("joinTeam", ({ teamName }) => {
    socket.join(teamName);
  });
});

/* ===== API ===== */

// create team
app.post("/api/team/create", async (req,res)=>{
  const { name, password } = req.body;

  const exists = await Team.findOne({ name });
  if(exists) return res.json({ message:"Team exists" });

  await Team.create({ name, password });
  res.json({ message:"Team created" });
});

// login
app.post("/api/team/login", async (req,res)=>{
  const { name, password } = req.body;

  const team = await Team.findOne({ name });

  if(!team) return res.json({ message:"Team not found" });
  if(team.password !== password) return res.json({ message:"Wrong password" });

  res.json({ success:true });
});

// join team
app.post("/api/team/join", async (req,res)=>{
  const { name, memberName } = req.body;

  const team = await Team.findOne({ name });

  if(!team) return res.json({ message:"Error" });

  const exists = team.members.find(m=>m.name===memberName);

  if(!exists){
    team.members.push({ name: memberName });
    await team.save();
  }

  res.json({ success:true });
});

// teams
app.get("/api/teams", async (req,res)=>{
  res.json(await Team.find());
});

// team
app.get("/api/team/:name", async (req,res)=>{
  res.json(await Team.findOne({ name: req.params.name }));
});

// categories
app.get("/api/categories", async (req,res)=>{
  const categories = await Question.distinct("category");
  res.json(categories);
});

// questions
app.get("/api/questions/:category", async (req,res)=>{
  res.json(await Question.find({ category: req.params.category }));
});

// submit
app.post("/api/submit", async (req,res)=>{
  const { teamName, questionId, answer } = req.body;

  const team = await Team.findOne({ name: teamName });
  const question = await Question.findById(questionId);

  if(!team || !question) return res.json({});

  const already = team.answers.find(a=>a.questionId.toString()===questionId);

  if(already) return res.json({ correct: already.correct });

  const correct = question.correctAnswer === answer;

  if(correct) team.score += question.points;

  team.answers.push({ questionId, correct, answer });

  await team.save();

  io.to(teamName).emit("questionAnswered",{ questionId, correct, answer });
  io.emit("scoreUpdate");

  res.json({ correct });
});

// leaderboard
app.get("/api/leaderboard", async (req,res)=>{
  const teams = await Team.find().sort({ score:-1 });
  res.json(teams);
});

// help
app.post("/api/ticket", async (req,res)=>{
  await Ticket.create(req.body);
  io.emit("newTicket");
  res.json({ success:true });
});

/* ===== PAGES ===== */
app.get("/", (req,res)=>{
  res.sendFile(path.join(__dirname,"../frontend/pages/index.html"));
});

app.get("/dashboard",(req,res)=>{
  res.sendFile(path.join(__dirname,"../frontend/pages/dashboard.html"));
});

app.get("/leaderboard",(req,res)=>{
  res.sendFile(path.join(__dirname,"../frontend/pages/leaderboard.html"));
});

const PORT = process.env.PORT || 3000;

server.listen(PORT, ()=>{
  console.log("🔥 Running on "+PORT);
});
</script>
</body>
</html>
