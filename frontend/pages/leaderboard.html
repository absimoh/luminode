<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
  <div class="nav-left">
    <img src="/assets/images/logo.png">
    <img src="/assets/images/org.png">
  </div>

  <div class="nav-links">
    <a href="/dashboard">Home</a>
    <a href="/leaderboard">Leaderboard</a>
  </div>
</div>

<div class="container">

  <h1>🏆 Leaderboard</h1>

  <!-- 🔥 TOP 3 -->
  <div id="top3" style="display:flex; justify-content:center; gap:20px; margin:30px 0;"></div>

  <!-- 🔥 باقي الترتيب -->
  <div id="leaderboardContainer"></div>

</div>

<div class="footer">
  © 2026 Abbas Al-Mokhtafi. All Rights Reserved.
</div>

<script>

async function loadLeaderboard(){

  const res = await fetch("/api/leaderboard");
  const data = await res.json();

  // 🔒 لو leaderboard مقفلة
  if(data.message === "Leaderboard closed"){
    document.getElementById("leaderboardContainer").innerHTML =
      "<h2>🚫 Leaderboard is currently closed</h2>";
    return;
  }

  const users = data;

  const container = document.getElementById("leaderboardContainer");
  const top3 = document.getElementById("top3");

  container.innerHTML = "";
  top3.innerHTML = "";

  // ===== TOP 3 =====
  const medals = ["🥇","🥈","🥉"];

  users.slice(0,3).forEach((user, index) => {

    const div = document.createElement("div");

    div.style.background = "rgba(15,25,60,0.9)";
    div.style.padding = "20px";
    div.style.borderRadius = "15px";
    div.style.boxShadow = "0 0 20px rgba(120,100,255,0.5)";
    div.style.width = "150px";

    div.innerHTML = `
      <h2>${medals[index]}</h2>
      <p>${user.username || "User"}</p>
      <strong>⭐ ${user.score}</strong>
    `;

    top3.appendChild(div);
  });

  // ===== باقي المستخدمين =====
  users.slice(3).forEach((user, index) => {

    const div = document.createElement("div");
    div.className = "leaderboard-row";

    div.innerHTML = `
      <span> #${index + 4} - ${user.username || "User"}</span>
      <span>⭐ ${user.score}</span>
    `;

    container.appendChild(div);

  });
}

/* ===== AUTO REFRESH ===== */
setInterval(loadLeaderboard, 3000);

/* ===== INIT ===== */
loadLeaderboard();

</script>

</body>
</html>
