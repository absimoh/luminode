<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
  <div class="nav-left">
    <img src="/assets/images/logo.png">
    <img src="/assets/images/org.png">
  </div>

  <div class="nav-links">
    <a href="/dashboard">Home</a>
    <a href="/leaderboard">Leaderboard</a>
  </div>
</div>

<div class="container">

  <h1>🏆 Leaderboard</h1>

  <div id="leaderboardContainer"></div>

</div>

<div class="footer">
  © 2026 Abbas Al-Mokhtafi. All Rights Reserved.
</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let controlState = {};

/* ===== LOAD CONTROL ===== */
async function loadControl(){
  const res = await fetch("/api/control");
  controlState = await res.json();
}

/* ===== LOAD LEADERBOARD ===== */
async function loadLeaderboard(){

  await loadControl(); // 🔥 مهم

  const container = document.getElementById("leaderboardContainer");

  // ❌ إذا مقفول
  if(!controlState.leaderboardOpen){
    container.innerHTML = "<p>🚫 Leaderboard is closed</p>";
    return;
  }

  // ✅ إذا مفتوح
  const res = await fetch("/api/leaderboard");
  const teams = await res.json();

  container.innerHTML = "";

  teams.forEach((team, index) => {

    const div = document.createElement("div");
    div.className = "leaderboard-row";

    div.innerHTML = `
      <span> #${index + 1} - ${team.name}</span>
      <span>⭐ ${team.score}</span>
    `;

    container.appendChild(div);

  });
}

/* ===== REALTIME ===== */

// 🔥 تحديث السكور
socket.on("scoreUpdate", () => {
  loadLeaderboard();
});

// 🔥 فتح/إغلاق مباشر
socket.on("controlUpdate", (data)=>{
  controlState = data;
  loadLeaderboard();
});

/* ===== INIT ===== */
loadLeaderboard();

</script>

</body>
</html>
