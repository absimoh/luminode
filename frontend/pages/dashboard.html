<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team Dashboard</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
  <div class="nav-left">
    <img src="/assets/images/logo.png">
    <img src="/assets/images/org.png">
  </div>

  <div class="nav-links">
    <a href="/dashboard">Home</a>
    <a href="/leaderboard">Leaderboard</a>
  </div>
</div>

<div class="container">

  <div class="team-info">
    <div class="team-name">
      🛰 Team: <span id="teamNameDisplay"></span>
    </div>
    <div class="team-score">
      ⭐ Score: <span id="teamScore">0</span>
    </div>
  </div>

  <button class="help-btn" onclick="openHelpModal()">
    🚨 Request Help
  </button>

  <div id="categories" class="category-grid"></div>
  <div id="questionNumbers" class="question-numbers-top"></div>
  <div id="questionsContainer"></div>
</div>

<div class="footer">
  © 2026 Abbas Al-Mokhtafi. All Rights Reserved.
</div>

<!-- ===== HELP MODAL ===== -->
<div id="helpModal" class="modal">
  <div class="modal-content">
    <h2>🚨 Request Help</h2>

    <textarea 
      id="helpMessage"
      class="input-box"
      placeholder="Describe your issue..."
    ></textarea>

    <button class="primary-btn" onclick="sendHelp()">
      Send Request
    </button>

    <button class="danger-btn" onclick="closeHelpModal()">
      Cancel
    </button>

  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "/login";
}

const socket = io();

// 🔐 join user
socket.emit("joinUser", { token });

/* ===== USER INFO ===== */
let userScore = 0;

async function loadScore(){
  const res = await fetch("/api/leaderboard");
  const users = await res.json();

  const myToken = JSON.parse(atob(token.split('.')[1]));
  const myId = myToken.userId;

  const me = users.find(u => u._id === myId);

  if(me){
    userScore = me.score;
    document.getElementById("teamScore").innerText = userScore;
    document.getElementById("teamNameDisplay").innerText = "User";
  }
}

/* ===== SOCKET ===== */
socket.on("scoreUpdate", () => {
  loadScore();
});

/* ===== LOAD CATEGORIES ===== */
async function loadCategories(){
  const res = await fetch("/api/categories");
  const categories = await res.json();

  const container = document.getElementById("categories");
  container.innerHTML = "";

  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.innerText = cat;
    btn.onclick = () => loadQuestions(cat);
    container.appendChild(btn);
  });
}

let currentQuestions = [];
let currentIndex = 0;
let answeredStatus = {};

/* ===== LOAD QUESTIONS ===== */
async function loadQuestions(category){

  try {

    const res = await fetch(`/api/questions/${category}`);
    const data = await res.json();

    if (!Array.isArray(data)) {
      document.getElementById("questionsContainer").innerHTML =
        `<p>${data.message || "Error loading questions"}</p>`;
      return;
    }

    currentQuestions = data;
    currentIndex = 0;
    answeredStatus = {};

    renderNumbers();
    renderQuestion();

  } catch (err) {
    document.getElementById("questionsContainer").innerHTML =
      `<p>Server error</p>`;
  }
}

/* ===== RENDER NUMBERS ===== */
function renderNumbers(){

  const container = document.getElementById("questionNumbers");
  container.innerHTML = "";

  currentQuestions.forEach((q,i)=>{

    const btn = document.createElement("button");
    btn.innerText = i + 1;

    if(i === currentIndex){
      btn.style.background = "#f59e0b";
    }

    if(answeredStatus[q._id] === true){
      btn.style.background = "#22c55e";
    }

    if(answeredStatus[q._id] === false){
      btn.style.background = "#ef4444";
    }

    btn.onclick = ()=>{
      currentIndex = i;
      renderQuestion();
      renderNumbers();
    };

    container.appendChild(btn);

  });

}

/* ===== RENDER QUESTION ===== */
function renderQuestion(){

  const container = document.getElementById("questionsContainer");
  container.innerHTML = "";

  if(currentQuestions.length === 0){
    container.innerHTML = "<p>No questions available</p>";
    return;
  }

  const q = currentQuestions[currentIndex];

  const card = document.createElement("div");
  card.className = "question-card";

  let optionsHTML = "";

  q.options.forEach(opt => {

    let disabled = answeredStatus[q._id] !== undefined ? "disabled" : "";

    let style = "";

    if (answeredStatus[q._id] !== undefined) {
      if (answeredStatus[q._id]) style = "background: green;";
      else style = "background: red;";
    }

    optionsHTML += `
      <button class="option-btn"
        ${disabled}
        style="${style}"
        onclick="submitAnswer('${q._id}','${opt}',this)">
        ${opt}
      </button>
    `;
  });

  card.innerHTML = `
    <h3>Question ${currentIndex + 1}</h3>
    <p style="margin-bottom:20px;">${q.question}</p>

    <div class="options-grid">
      ${optionsHTML}
    </div>

    <div class="pagination">
      <button onclick="prevQuestion()">⬅ Prev</button>
      <button onclick="nextQuestion()">Next ➡</button>
    </div>
  `;

  container.appendChild(card);
}

/* ===== NAVIGATION ===== */
function nextQuestion(){
  if(currentIndex < currentQuestions.length - 1){
    currentIndex++;
    renderQuestion();
    renderNumbers();
  }
}

function prevQuestion(){
  if(currentIndex > 0){
    currentIndex--;
    renderQuestion();
    renderNumbers();
  }
}

/* ===== SUBMIT ANSWER 🔐 ===== */
async function submitAnswer(questionId, answer, btn){

  const res = await fetch("/api/submit",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization: token
    },
    body: JSON.stringify({
      questionId,
      answer
    })
  });

  const data = await res.json();

  answeredStatus[questionId] = data.correct;

  renderNumbers();

  btn.parentElement.querySelectorAll("button").forEach(b => b.disabled = true);

  if(data.correct){
    btn.style.background = "green";
    await loadScore();
  }else{
    btn.style.background = "red";
  }
}

/* ===== HELP SYSTEM ===== */
function openHelpModal(){
  document.getElementById("helpModal").style.display = "flex";
}

function closeHelpModal(){
  document.getElementById("helpModal").style.display = "none";
}

async function sendHelp(){
  const message = document.getElementById("helpMessage").value;

  await fetch("/api/ticket",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization: token
    },
    body: JSON.stringify({
      message
    })
  });

  alert("Help request sent");
  closeHelpModal();
}

/* ===== INIT ===== */
loadScore();
loadCategories();

</script>
</body>
</html>
