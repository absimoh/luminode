<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team Dashboard</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
  <div class="nav-left">
    <img src="/assets/images/logo.png">
    <img src="/assets/images/org.png">
  </div>

  <div class="nav-links">
    <a href="/dashboard.html">Home</a>
    <a href="/leaderboard.html">Leaderboard</a>
  </div>
</div>

<div class="container">

  <div class="team-info">
    <div class="team-name">
      🛰 Team: <span id="teamNameDisplay"></span>
    </div>
    <div class="team-score">
      ⭐ Score: <span id="teamScore">0</span>
    </div>
  </div>

  <button class="help-btn" onclick="openHelpModal()">
    🚨 Request Help
  </button>

  <div id="categories" class="category-grid"></div>
  <div id="questionNumbers" class="question-numbers-top"></div>
  <div id="questionsContainer"></div>

</div>

<div class="footer">
  © 2026 Abbas Al-Mokhtafi. All Rights Reserved.
</div>

<!-- ===== HELP MODAL ===== -->
<div id="helpModal" class="modal">
  <div class="modal-content">
    <h2>🚨 Request Help</h2>

    <textarea id="helpMessage" class="input-box" placeholder="Describe your issue..."></textarea>

    <button class="primary-btn" onclick="sendHelp()">Send Request</button>
    <button class="danger-btn" onclick="closeHelpModal()">Cancel</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const token = localStorage.getItem("token");
const teamName = localStorage.getItem("teamName");

if (!token || !teamName) {
  window.location.href = "/pages/index.html";
}

const socket = io({
  transports: ["websocket"]
});

// 🔥 انضمام للفريق
socket.emit("joinTeam", { teamName });

document.getElementById("teamNameDisplay").innerText = teamName;

/* ===== SOCKET ===== */
socket.on("questionAnswered", (data) => {

  answeredStatus[data.questionId] = data.correct;
  answeredStatus[data.questionId + "_selected"] = data.answer;

  renderNumbers();
  renderQuestion();
  loadScore();
});
socket.on("scoreUpdate", () => {
  loadScore();
});

/* ===== LOAD SCORE ===== */
async function loadScore(){
  try {
    const res = await fetch("/api/teams");
    const teams = await res.json();
    const team = teams.find(t => t.name === teamName);

    if(team){
      document.getElementById("teamScore").innerText = team.score;
    }
  } catch(err){
    console.log(err);
  }
}

/* ===== RENDER NUMBERS ===== */
function renderNumbers(){

  const container = document.getElementById("questionNumbers");
  container.innerHTML = "";

  currentQuestions.forEach((q,i)=>{

    const btn = document.createElement("button");
    btn.innerText = i + 1;

      if(i === currentIndex){
        btn.classList.add("active");
      }

      if(answeredStatus[q._id] === true){
        btn.classList.add("correct");
      }

      if(answeredStatus[q._id] === false){
        btn.classList.add("wrong");
}

    btn.onclick = ()=>{
      currentIndex = i;
      renderQuestion();
      renderNumbers();
    };

    container.appendChild(btn);

  });

}

/* ===== LOAD CATEGORIES ===== */
async function loadCategories(){
  try {
    const res = await fetch("/api/categories");
    const categories = await res.json();

    const container = document.getElementById("categories");
    container.innerHTML = "";

    categories.forEach(cat => {
      const btn = document.createElement("button");
      btn.innerText = cat;
      btn.onclick = () => loadQuestions(cat);
      container.appendChild(btn);
    });

  } catch(err){
    console.log(err);
  }
}

let currentQuestions = [];
let currentIndex = 0;
let answeredStatus = {};

/* ===== LOAD QUESTIONS ===== */
async function loadQuestions(category){

  try {

    const res = await fetch(`/api/questions/${category}`);
    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0) {
      document.getElementById("questionsContainer").innerHTML =
        `<p>No questions found</p>`;
      return;
    }

    // جلب إجابات الفريق
    const teamRes = await fetch(`/api/team/${teamName}`);
    const teamData = await teamRes.json();

    answeredStatus = {};

    teamData.answers.forEach(a => {
      answeredStatus[a.questionId.toString()] = a.correct;
      answeredStatus[a.questionId.toString() + "_selected"] = a.answer;
    });

    currentQuestions = data;
    currentIndex = 0;

    renderNumbers();
    renderQuestion();

  } catch (err) {
    console.log(err);
  }
}

/* ===== RENDER QUESTION ===== */
function renderQuestion(){

  const container = document.getElementById("questionsContainer");
  container.innerHTML = "";

  if(currentQuestions.length === 0){
    container.innerHTML = "<p>No questions</p>";
    return;
  }

  const q = currentQuestions[currentIndex];

  const card = document.createElement("div");
  card.className = "question-card";

  let optionsHTML = "";

  q.options.forEach(opt => {

    let disabled = answeredStatus[q._id] !== undefined ? "disabled" : "";

    let selected = answeredStatus[q._id + "_selected"] === opt;

    let style = "";

    if (selected && answeredStatus[q._id] === true) {
      style = "background: green;";
    }

    if (selected && answeredStatus[q._id] === false) {
      style = "background: red;";
    }

    optionsHTML += `
      <button class="option-btn"
        ${disabled}
        style="${style}"
        onclick="submitAnswer('${q._id}','${opt}',this)">
        ${opt}
      </button>
    `;
  });

  card.innerHTML = `
    <h3>Question ${currentIndex + 1}</h3>
    <p style="margin-bottom:20px;">${q.question}</p>

    <div class="options-grid">
      ${optionsHTML}
    </div>

    <div class="pagination">
      <button onclick="prevQuestion()">⬅ Prev</button>
      <button onclick="nextQuestion()">Next ➡</button>
    </div>
  `;

  container.appendChild(card);
}

/* ===== NAVIGATION ===== */
function nextQuestion(){
  if(currentIndex < currentQuestions.length - 1){
    currentIndex++;
    renderQuestion();
    renderNumbers();
  }
}

function prevQuestion(){
  if(currentIndex > 0){
    currentIndex--;
    renderQuestion();
    renderNumbers();
  }
}

/* ===== SUBMIT ANSWER ===== */
async function submitAnswer(questionId, answer, btn){

  const res = await fetch("/api/submit",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      teamName,
      questionId,
      answer
    })
  });

  const data = await res.json();

  answeredStatus[questionId] = data.correct;
  answeredStatus[questionId + "_selected"] = answer;

  renderNumbers();

  btn.parentElement.querySelectorAll("button").forEach(b => b.disabled = true);

  if(data.correct){
    btn.style.background = "green";
    await loadScore();
  }else{
    btn.style.background = "red";
  }
}

/* ===== HELP SYSTEM ===== */
function openHelpModal(){
  document.getElementById("helpModal").style.display = "flex";
}

function closeHelpModal(){
  document.getElementById("helpModal").style.display = "none";
}

async function sendHelp(){
  const message = document.getElementById("helpMessage").value;

  await fetch("/api/ticket",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      teamName,
      message
    })
  });

  alert("Help request sent");
  closeHelpModal();
}

/* ===== INIT ===== */
loadScore();
loadCategories();

</script>

</body>
</html>
