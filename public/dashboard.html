<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Luminode</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard">

  <div class="sidebar">
    <h2>Categories</h2>
    <button onclick="loadCategory('AI')">AI</button>
    <button onclick="loadCategory('Planets')">Planets</button>
    <button onclick="loadCategory('Stars')">Stars</button>
    <button onclick="loadCategory('Galaxies')">Galaxies</button>
    <button onclick="loadCategory('Moons')">Moons</button>
    <button onclick="loadCategory('Universe')">Universe</button>
  </div>

  <div class="main">

    <div class="topbar">
      <span id="teamInfo"></span>
      <span id="scoreInfo"></span>
    </div>

    <div class="difficulty-tabs">
      <button onclick="setDifficulty('easy')">Easy</button>
      <button onclick="setDifficulty('medium')">Medium</button>
      <button onclick="setDifficulty('hard')">Hard</button>
    </div>

    <div id="questionsGrid" class="questions-grid"></div>

  </div>

</div>

<script src="js/dashboard.js"></script>
</body>
</html>
