<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team Dashboard - Luminode</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<div class="navbar">
  <div class="nav-left">
    <img src="/org.png">
    <img src="/logo.png">
  </div>

  <div class="nav-links">
    <a href="/dashboard.html">Home</a>
    <a href="/leaderboard.html">Leaderboard</a>
  </div>
</div>

<!-- ================= CONTENT ================= -->
<div class="container">

  <h1>Team Dashboard</h1>

  <button class="help-btn" onclick="requestHelp()">Request Help</button>

  <!-- ================= CATEGORY BUTTONS ================= -->
  <div class="category-grid">
    <button onclick="loadCategory('AI')">AI</button>
    <button onclick="loadCategory('Galaxies')">Galaxies</button>
    <button onclick="loadCategory('Universe')">Universe</button>
    <button onclick="loadCategory('Stars')">Stars</button>
    <button onclick="loadCategory('Moons')">Moons</button>
    <button onclick="loadCategory('Planets')">Planets</button>
  </div>

  <!-- ================= QUESTIONS AREA ================= -->
  <div id="questionsContainer"></div>

</div>

<!-- ================= FOOTER ================= -->
<div class="footer">
  © 2026 Abbas Mohammed Al-Mukhtafi. All Rights Reserved.
</div>

<script>

const teamName = localStorage.getItem("teamName");

if(!teamName){
  window.location.href = "/";
}

async function loadCategory(category){

  const res = await fetch(`/api/questions/${category}`);
  const data = await res.json();

  const container = document.getElementById("questionsContainer");
  container.innerHTML = "";

  if(data.length === 0){
    container.innerHTML = "<p style='text-align:center;'>No questions available</p>";
    return;
  }

  data.forEach(q => {

    const card = document.createElement("div");
    card.className = "question-card";

    card.innerHTML = `
      <h3>${q.question}</h3>
      <div class="options-grid">
        ${q.options.map(opt =>
          `<button class="option-btn" onclick="submitAnswer('${q._id}','${opt}',this)">
            ${opt}
          </button>`
        ).join("")}
      </div>
    `;

    container.appendChild(card);
  });
}

async function submitAnswer(questionId, answer, btn){

  const res = await fetch("/api/submit",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      teamName,
      questionId,
      answer
    })
  });

  const data = await res.json();

  if(data.correct){
    btn.style.background = "green";
  }else{
    btn.style.background = "red";
  }

  btn.parentElement.querySelectorAll("button").forEach(b => b.disabled = true);
}

async function requestHelp(){

  const message = prompt("Describe your issue:");

  if(!message) return;

  await fetch("/api/ticket",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      teamName,
      message
    })
  });

  alert("Help request sent to admin");
}

</script>

</body>
</html>
