<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team Dashboard</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
  <div class="nav-left">
    <img src="/org.png">
    <img src="/logo.png">
  </div>

  <div class="nav-links">
    <a href="/dashboard.html">Home</a>
    <a href="/leaderboard.html">Leaderboard</a>
  </div>
</div>

<div class="container">

  <div class="team-info">
  <div class="team-name">
    🛰 Team: <span id="teamNameDisplay"></span>
  </div>
  <div class="team-score">
    ⭐ Score: <span id="teamScore">0</span>
  </div>
</div>

  <button class="help-btn" onclick="openHelpModal()">
    🚨 Request Help
  </button>

  <div id="categories" class="category-grid"></div>
  <div id="questionNumbers" class="question-numbers-top"></div>
  <div id="questionsContainer"></div>
</div>

<div class="footer">
  © 2026 Abbas Al-Mokhtafi. All Rights Reserved.
</div>

<!-- ===== HELP MODAL ===== -->
<div id="helpModal" class="modal">
  <div class="modal-content">
    <h2>Request Help</h2>
    <textarea id="helpMessage" placeholder="Describe your issue..." style="width:100%;padding:10px;border-radius:8px;"></textarea>
    <button onclick="sendHelp()">Send</button>
    <button onclick="closeHelpModal()" class="close-btn">Cancel</button>
  </div>
</div>

<script>

const teamName = localStorage.getItem("teamName");
if (!teamName) window.location.href = "/";

document.getElementById("teamNameDisplay").innerText = teamName;

async function loadScore(){
  const res = await fetch("/api/teams");
  const teams = await res.json();
  const team = teams.find(t => t.name === teamName);
  if(team){
    document.getElementById("teamScore").innerText = team.score;
  }
}

function renderNumbers(){

  const container = document.getElementById("questionNumbers");
  container.innerHTML = "";

  currentQuestions.forEach((q,i)=>{

    const btn = document.createElement("button");
    btn.innerText = i + 1;

    // السؤال الحالي
    if(i === currentIndex){
      btn.style.background = "#f59e0b";
    }

    // السؤال محلول صح
    if(answeredStatus[q._id] === true){
      btn.style.background = "#22c55e";
    }

    // السؤال محلول خطأ
    if(answeredStatus[q._id] === false){
      btn.style.background = "#ef4444";
    }

    btn.onclick = ()=>{
      currentIndex = i;
      renderQuestion();
      renderNumbers();
    };

    container.appendChild(btn);

  });

}

async function loadCategories(){
  const res = await fetch("/api/categories");
  const categories = await res.json();

  const container = document.getElementById("categories");
  container.innerHTML = "";

  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.innerText = cat;
    btn.onclick = () => loadQuestions(cat);
    container.appendChild(btn);
  });
}

let currentQuestions = [];
let currentIndex = 0;
let answeredStatus = {};

async function loadQuestions(category){

  const res = await fetch(`/api/questions/${category}`);
  const data = await res.json();

  // نجيب بيانات الفريق
  const teamRes = await fetch(`/api/team/${teamName}`);
  const teamData = await teamRes.json();

  // نخزن حالة الإجابات
  answeredStatus = {};

  teamData.answers.forEach(a => {
    answeredStatus[a.questionId] = a.correct;
  });
  
  if(data.message){
    document.getElementById("questionsContainer").innerHTML =
      `<p>${data.message}</p>`;
    return;
  }

  currentQuestions = data;
  currentIndex = 0;

  renderQuestion();
  renderNumbers();
}

function renderQuestion(){

  const container = document.getElementById("questionsContainer");
  container.innerHTML = "";

  if(currentQuestions.length === 0){
    container.innerHTML = "<p>No questions available</p>";
    return;
  }

  const q = currentQuestions[currentIndex];

  const card = document.createElement("div");
  card.className = "question-card";

  const answered = answeredStatus[q._id];

  card.innerHTML = `
    <h3>Question ${currentIndex + 1}</h3>
    <p style="margin-bottom:20px;">${q.question}</p>

    <div class="options-grid">
      ${q.options.map(opt => {

        let disabled = answered !== undefined ? "disabled" : "";
        let color = "";

        if(answered !== undefined){
          if(opt === q.correctAnswer){
            color = "background: green";
          }
        }

        return `
          <button class="option-btn"
            ${disabled}
            style="${color}"
            onclick="submitAnswer('${q._id}','${opt}',this)">
            ${opt}
          </button>
        `;

      }).join("")}
    </div>

    <div class="pagination">
      <button onclick="prevQuestion()">⬅ Prev</button>
      <button onclick="nextQuestion()">Next ➡</button>
    </div>
  `;

  container.appendChild(card);
}

function nextQuestion(){
  if(currentIndex < currentQuestions.length - 1){
    currentIndex++;
    renderQuestion();
    renderNumbers();
  }
}

function prevQuestion(){
  if(currentIndex > 0){
    currentIndex--;
    renderQuestion();
    renderNumbers();
  }
}

async function submitAnswer(questionId, answer, btn){

  const res = await fetch("/api/submit",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      teamName,
      questionId,
      answer
    })
  });

  const data = await res.json();
  answeredStatus[questionId] = data.correct;
  renderNumbers();
  
  btn.parentElement.querySelectorAll("button").forEach(b => b.disabled = true);

  if(data.correct){
    btn.style.background = "green";
    await loadScore();
  }else{
    btn.style.background = "red";
  }
}

/* ===== HELP SYSTEM ===== */

function openHelpModal(){
  document.getElementById("helpModal").style.display = "flex";
}

function closeHelpModal(){
  document.getElementById("helpModal").style.display = "none";
}

async function sendHelp(){
  const message = document.getElementById("helpMessage").value;

  await fetch("/api/ticket",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      teamName,
      message
    })
  });

  alert("Help request sent to admin");
  closeHelpModal();
}

loadScore();
loadCategories();

</script>

</body>
</html>
