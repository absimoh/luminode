<!DOCTYPE html>
<html>
<head>
  <title>Join Team</title>
</head>
<body style="text-align:center; margin-top:80px; font-family:Arial">

<h2>Join Team</h2>

<input id="name" placeholder="Team Name"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<input id="memberName" placeholder="Your Name"><br><br>

<button onclick="joinTeam()">Join</button>

<p id="result"></p>

<script>
async function joinTeam() {
  const res = await fetch("/api/team/join", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: document.getElementById("name").value,
      password: document.getElementById("password").value,
      memberName: document.getElementById("memberName").value
    })
  });

  const data = await res.json();

  if (res.ok) {
    localStorage.setItem("teamName", data.team.name);
    window.location.href = "team.html";
  } else {
    document.getElementById("result").innerText = data.message;
  }
}
</script>

</body>
</html>
