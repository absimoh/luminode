<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
  <div class="nav-left">
    <img src="/org.png">
    <img src="/logo.png">
  </div>

  <div class="nav-links">
    <a href="/dashboard.html">Dashboard</a>
    <a href="/leaderboard.html">Leaderboard</a>
  </div>
</div>

<div class="container">

  <h1>⚙ Admin Panel</h1>

  <!-- ===== CREATE TEAM ===== -->
  <div class="admin-card">

    <h2>Create Team</h2>

    <input id="teamName" placeholder="Team Name">
    <input id="teamPassword" placeholder="Password">

    <button onclick="createTeam()">Create Team</button>

  </div>

  <!-- ===== CONTROL ===== -->
  <div class="admin-card">

    <h2>Control Competition</h2>

    <button onclick="toggleChallenges(true)">Open Challenges</button>
    <button onclick="toggleChallenges(false)">Close Challenges</button>

    <button onclick="toggleLeaderboard(true)">Open Leaderboard</button>
    <button onclick="toggleLeaderboard(false)">Close Leaderboard</button>

  </div>

  <!-- ===== TICKETS ===== -->
  <div class="admin-card">

    <h2>Help Requests</h2>

    <div id="ticketsContainer"></div>

  </div>

</div>

<div class="footer">
  © 2026 Abbas Al-Mokhtafi
</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

/* ===== CREATE TEAM ===== */
async function createTeam(){

  const name = document.getElementById("teamName").value;
  const password = document.getElementById("teamPassword").value;

  const res = await fetch("/api/admin/create-team",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ name, password })
  });

  const data = await res.json();
  alert(data.message);
}

/* ===== CONTROL ===== */
async function toggleChallenges(status){

  await fetch("/api/control",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ challengesOpen: status })
  });

  alert("Updated");
}

async function toggleLeaderboard(status){

  await fetch("/api/control",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ leaderboardOpen: status })
  });

  alert("Updated");
}

/* ===== LOAD TICKETS ===== */
async function loadTickets(){

  const res = await fetch("/api/tickets");
  const tickets = await res.json();

  const container = document.getElementById("ticketsContainer");
  container.innerHTML = "";

  tickets.forEach(t => {

    const div = document.createElement("div");
    div.className = "ticket-card";

    div.innerHTML = `
      <strong>${t.teamName}</strong>
      <p>${t.message}</p>
    `;

    container.appendChild(div);

  });
}

/* ===== REALTIME TICKETS ===== */
socket.on("newTicket", () => {
  loadTickets();
});

/* ===== INIT ===== */
loadTickets();

</script>

</body>
</html>
