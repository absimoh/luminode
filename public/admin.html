<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
  <div class="nav-left">
    <img src="/logo.png" class="logo">
    <img src="/org.png" class="org-logo">
  </div>
</div>

<div class="main-container">
  <h1>Admin Control Panel</h1>

  <div class="admin-buttons">
    <button class="btn" onclick="updateControl(true,false)">Open Challenges</button>
    <button class="btn" onclick="updateControl(false,false)">Close Challenges</button>
    <button class="btn" onclick="updateControl(false,true)">Open Leaderboard</button>
    <button class="btn" onclick="updateControl(false,false)">Close Leaderboard</button>
  </div>
</div>

<footer>
  © 2026 Abbas Al-Mokhtafi. All Rights Reserved.
</footer>

<script>
async function updateControl(challenges, leaderboard) {
  await fetch("/api/control", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      challengesOpen: challenges,
      leaderboardOpen: leaderboard
    })
  });

  alert("Updated successfully");
}
</script>

</body>
</html>
